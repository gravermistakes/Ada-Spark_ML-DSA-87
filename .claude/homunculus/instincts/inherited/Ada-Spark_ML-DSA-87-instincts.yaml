# Language Policy

## Action

Don't. Delete it and write it in Ada or Bash. The policy covers everything:
library code, tests, tooling, KAT generators, and anything run to produce a
committed artifact. No Python (including hashlib), Go, Rust, Ruby, Perl, or
JavaScript.

## Evidence

- Root CLAUDE.md "Language policy (non-negotiable)"
- PR #20 rewrote the last Python scripts (`rule30_salt.py`, `build_seal.py`)
  into Ada and Bash

