# Commit Format

## Action

Write freeform imperative commit messages, ~50-60 characters on the subject
line, area-prefixed where natural (`changelog:`, `deoxys:`).

## Evidence

- Repo history: "Fix CI: add ml-dsa source path to run_tests.sh", "deoxys: cap
  subagent model tier at Sonnet", "changelog: add ML-DSA-87 to the status sheet"

