# Naming Files And Identifiers

## Action

Ada source files must use the GNAT lowercase unit name — `lthing_*.ads` (spec) /
`lthing_*.adb` (body); test mains are `test_*.adb`. That is a compiler rule.
Beyond it, naming in this repo is deliberately mixed — sometimesMixedCases,
some_with_underscores, some-with-hyphens. Match the surrounding file or context;
do not impose a single case convention.

## Evidence

- `lthing_keccak.ads`, `test_kat87.adb`, `run_tests.sh` (GNAT-required)
- `Ada-Spark_ML-DSA-87`, `rnDEOXYSii`, `leadEngineer`, `DEOXY_1_41.md`,
  `lthing-status.html` (owner's mixed style)

