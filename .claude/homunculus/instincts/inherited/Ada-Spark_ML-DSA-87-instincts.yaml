# Definition Of Done

## Action

A change is done only when it builds, every test main prints all `[PASS]` and
exits 0, and `gnatprove -P lthing.gpr --level=2` reports 0 unproved. Fail-closed
gates are never weakened to get there.

## Evidence

- Root CLAUDE.md conventions; baseline 131 checks / 0 unproved
