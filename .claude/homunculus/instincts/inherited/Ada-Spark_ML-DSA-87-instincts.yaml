# Test Location

## Action

Add a test main at `lthing-spark/src/test_<unit>.adb` that prints
`[PASS]`/`[FAIL]` and calls `Set_Exit_Status (Failure)` on any failure.
`run_tests.sh` discovers and runs every `src/test_*.adb` automatically.

## Evidence

- `test_keccak.adb`, `test_kat87.adb`, `test_judicial.adb` colocated in `src/`
- `run_tests.sh` glob: `for src in src/test_*.adb`

