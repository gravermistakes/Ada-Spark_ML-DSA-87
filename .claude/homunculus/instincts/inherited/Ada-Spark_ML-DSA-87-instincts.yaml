# Test Vectors

## Action

Assert only authoritative KATs (published standard or pinned reference file) or
relational/property facts. Never paste a self-computed digest; never generate
vectors with a non-Ada/Bash tool.

## Evidence

- Root CLAUDE.md "No frozen / self-derived test vectors"
- `mldsa_kat_vectors.ads` / `mldsa87_kat_vectors.ads` (NIST ACVP sigVer),
  pinned Deoxys vector files in `lthing-spark/src/deoxys/vectors/`

